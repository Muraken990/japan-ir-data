name: Daily Update - Part 1 yfinance (Mon-Fri)

on:
  # 月曜〜金曜 JST 8:00 (UTC 23:00 前日) に自動実行
  schedule:
    - cron: '0 23 * * 0-4'

  # 手動実行を許可
  workflow_dispatch:

jobs:
  part1-yfinance:
    runs-on: ubuntu-latest
    
    steps:
      # ============================================================
      # セットアップ
      # ============================================================
      
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests yfinance
      
      # ============================================================
      # Step 1: yfinanceデータ取得
      # ============================================================
      
      - name: Check company list
        id: check-list
        run: |
          if [ -f "data/japan_companies_latest.csv" ]; then
            echo "list_exists=true" >> $GITHUB_OUTPUT
            echo "✅ japan_companies_latest.csv が見つかりました"
            COMPANY_COUNT=$(wc -l < data/japan_companies_latest.csv)
            echo "📊 企業数: $COMPANY_COUNT"
          else
            echo "list_exists=false" >> $GITHUB_OUTPUT
            echo "❌ japan_companies_latest.csv が見つかりません"
            echo "⚠️ ローカルで 1_scrape_yahoo_finance.py を実行して、japan_companies_latest.csv をアップロードしてください"
            exit 1
          fi
      
      - name: "Fetch yfinance data (Part 1: 1-2000社)"
        if: steps.check-list.outputs.list_exists == 'true'
        run: |
          echo "=========================================="
          echo "Step 1: yfinanceデータ取得開始 (1〜2000社)"
          echo "=========================================="
          python scripts/2_fetch_yfinance_data.py --skip 0 --limit 2000 --suffix _part1

      # ============================================================
      # Step 1.3: WordPress登録企業リスト取得
      # ============================================================

      - name: Fetch WordPress registered companies
        if: steps.check-list.outputs.list_exists == 'true'
        run: |
          echo "=========================================="
          echo "Step 1.3: WordPress登録企業リスト取得"
          echo "=========================================="
          python scripts/fetch_wordpress_companies.py

      - name: Commit WordPress companies list
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/wordpress_companies.csv || true
          git diff --staged --quiet || git commit -m "Update WordPress companies list $(date +'%Y-%m-%d')"
          git push || true

      # ============================================================
      # Step 1.5: 株価履歴データ取得・更新
      # ============================================================

      - name: Fetch stock price history
        if: steps.check-list.outputs.list_exists == 'true'
        run: |
          echo "=========================================="
          echo "Step 1.5: 株価履歴データ取得・更新"
          echo "=========================================="
          python scripts/fetch_stock_history.py

      - name: Commit stock history data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/stock_history/*.json || true
          git diff --staged --quiet || git commit -m "Update stock price history $(date +'%Y-%m-%d')"
          git push || true

      # ============================================================
      # Step 2: データ統合
      # ============================================================

      - name: Prepare Part 1 data for merge
        id: prepare
        run: |
          PART1_FILE=$(ls -t output/yfinance_all_fields_*_part1.csv 2>/dev/null | head -n1)
          if [ -n "$PART1_FILE" ]; then
            DATE=$(date +'%Y-%m-%d')
            cp "$PART1_FILE" "output/yfinance_all_fields_${DATE}.csv"
            echo "prepare_success=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Part1ファイルが見つかりません"
            echo "prepare_success=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge data (Part 1)
        id: merge
        if: steps.prepare.outputs.prepare_success == 'true'
        run: |
          YFINANCE_CSV=$(ls -t output/yfinance_all_fields_[0-9]*.csv 2>/dev/null | grep -v '_part' | head -n1)
          if [ -z "$YFINANCE_CSV" ]; then
            echo "❌ yfinanceデータが見つかりません"
            exit 1
          fi
          export YAHOO_JP_CSV=data/japan_companies_latest.csv
          export YFINANCE_CSV=$YFINANCE_CSV
          export OUTPUT_DIR=data
          python scripts/3_merge_data.py
          if [ -f "data/integrated_company_data.csv" ]; then
            echo "merge_success=true" >> $GITHUB_OUTPUT
          else
            echo "merge_success=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      # ============================================================
      # Step 3: WordPress更新 (1〜2000社)
      # ============================================================

      - name: "Update WordPress (Part 1: 1-2000社)"
        if: steps.merge.outputs.merge_success == 'true'
        env:
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          REQUEST_DELAY: '0.5'
        run: |
          echo "=========================================="
          echo "Step 3: WordPress更新開始 (1〜2000社)"
          echo "=========================================="
          python scripts/4_wordpress_smart_update.py --update-only --limit 2000

      # ============================================================
      # Artifacts保存
      # ============================================================

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: part1-yfinance-data
          path: |
            output/yfinance_all_fields_*_part1.csv
            output/yfinance_errors_*_part1.csv
            output/yfinance_success_*_part1.csv
          retention-days: 2
          if-no-files-found: warn

      # ============================================================
      # 実行サマリー
      # ============================================================

      - name: Generate summary
        if: always()
        run: |
          echo "## 📊 Part 1 実行サマリー" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**実行日時:** $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')" >> $GITHUB_STEP_SUMMARY
          echo "**対象:** 1〜2,000社" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Part 1 ワークフロー実行に失敗しました"
          echo "詳細: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
