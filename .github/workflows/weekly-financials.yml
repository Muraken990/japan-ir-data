name: Weekly Financials Update

on:
  # 毎週日曜 JST 9:00 (UTC 0:00) に自動実行
  schedule:
    - cron: '0 0 * * 0'

  # 手動実行を許可
  workflow_dispatch:

jobs:
  update-financials:
    runs-on: ubuntu-latest

    steps:
      # ============================================================
      # セットアップ
      # ============================================================

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests yfinance

      # ============================================================
      # Step 1: WordPress登録企業リスト取得
      # ============================================================

      - name: Fetch WordPress registered companies
        run: |
          echo "=========================================="
          echo "Step 1: WordPress登録企業リスト取得"
          echo "=========================================="
          python scripts/fetch_wordpress_companies.py

      - name: Check company list
        id: check-list
        run: |
          if [ -f "data/wordpress_companies.csv" ]; then
            echo "list_exists=true" >> $GITHUB_OUTPUT
            COMPANY_COUNT=$(wc -l < data/wordpress_companies.csv)
            echo "✅ wordpress_companies.csv: $COMPANY_COUNT 社"
          else
            echo "list_exists=false" >> $GITHUB_OUTPUT
            echo "❌ wordpress_companies.csv が見つかりません"
            exit 1
          fi

      # ============================================================
      # Step 2: 財務データ取得
      # ============================================================

      - name: Fetch financial data
        if: steps.check-list.outputs.list_exists == 'true'
        run: |
          echo "=========================================="
          echo "Step 2: 財務データ取得開始"
          echo "=========================================="
          python scripts/fetch_financials.py

      - name: Commit financial data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/financials/*.json || true
          git diff --staged --quiet || git commit -m "Update financial data $(date +'%Y-%m-%d')"
          git push || true

      # ============================================================
      # Step 3: WordPress更新
      # ============================================================

      - name: Update WordPress financials
        if: steps.check-list.outputs.list_exists == 'true'
        env:
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
        run: |
          echo "=========================================="
          echo "Step 3: WordPress財務データ更新"
          echo "=========================================="
          python scripts/update_financials.py

      # ============================================================
      # Artifacts保存
      # ============================================================

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: weekly-financials-data
          path: |
            data/financials/*.json
            data/wordpress_companies.csv
          retention-days: 30
          if-no-files-found: warn

      # ============================================================
      # 実行サマリー
      # ============================================================

      - name: Generate summary
        if: always()
        run: |
          echo "## 📊 週次財務データ更新サマリー" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**実行日時:** $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -d "data/financials" ]; then
            FILE_COUNT=$(ls -1 data/financials/*.json 2>/dev/null | wc -l)
            echo "✅ **財務データ:** ${FILE_COUNT} ファイル更新" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **財務データ:** 更新なし" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**処理フロー:**" >> $GITHUB_STEP_SUMMARY
          echo "1. WordPress登録企業リスト取得" >> $GITHUB_STEP_SUMMARY
          echo "2. yfinance財務データ取得（5年分）" >> $GITHUB_STEP_SUMMARY
          echo "3. WordPress yfinance_financials 更新" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ 週次財務データ更新に失敗しました"
          echo "詳細: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
