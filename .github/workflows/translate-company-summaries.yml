name: Translate Company Summaries (One-time)

on:
  # 手動実行のみ
  workflow_dispatch:
    inputs:
      limit:
        description: '処理する企業数（空欄で全件）'
        required: false
        default: ''
        type: string

jobs:
  translate-summaries:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openai

      - name: Translate company summaries
        env:
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          python scripts/translate_company_summaries.py $ARGS

      - name: Generate summary
        if: always()
        run: |
          echo "## 📊 会社概要翻訳サマリー" >> $GITHUB_STEP_SUMMARY
          echo "**実行日時:** $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ 会社概要翻訳に失敗しました"
